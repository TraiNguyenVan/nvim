name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up QEMU (optional, for multi-platform support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and Push the Docker image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Replaces with your docker repository format: username/repository:tag
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nvim:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nvim:${{ github.sha }}
          # Enable caching to speed up consecutive builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
